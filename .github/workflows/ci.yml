---
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.13'
            toxenv: py313
          - python-version: '3.14'
            toxenv: py314
    steps:
      - uses: actions/checkout@v6
        with:
          # setuptools-scm derives the package version from repo tags
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: python -m pip install tox

      - name: Run tests
        run: tox -e ${{ matrix.toxenv }}

  build:
    name: build sdist and wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tooling
        run: python -m pip install build twine setuptools-scm

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: twine check dist/*
